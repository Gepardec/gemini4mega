# -----------------------------
# Application
# -----------------------------
quarkus.application.name=gemini4mega
quarkus.http.port=8080

# -----------------------------
# Logging
# -----------------------------
quarkus.log.level=INFO
quarkus.log.category."com.gepardec".level=DEBUG

# -----------------------------
# REST Client (configKey = "zep")
# Used by: ZepAttendanceRestClient
# -----------------------------
quarkus.rest-client.zep.url=https://api.example.com
quarkus.rest-client.zep.connect-timeout=5S
quarkus.rest-client.zep.read-timeout=30S

# If your AuthHeaders implementation reads a token from config,
# keep a dedicated key like this:
zep.api-token=${ZEP_API_TOKEN:}

# -----------------------------
# LangChain4j OpenAI
# Used by: PromptService (@RegisterAiService)
# -----------------------------
quarkus.langchain4j.openai.api-key=API-TOKEN
quarkus.langchain4j.chat-model.provider=openai
quarkus.langchain4j.ai.gemini.chat-model.model-id=gpt-4o

#quarkus.langchain4j.ai.gemini.chat-model.temperature=0.2
#quarkus.langchain4j.ai.gemini.chat-model.top-p=0.9
#quarkus.langchain4j.chat-memory.memory-window.max-messages=20

quarkus.langchain4j.log-requests=true
quarkus.langchain4j.log-responses=true

# -----------------------------
# Profile-specific overrides
# -----------------------------
%dev.quarkus.log.level=DEBUG
%dev.quarkus.rest-client.zep.url=https://www.zep-online.de/zepgepardecservices_test

%test.quarkus.log.level=DEBUG
%test.quarkus.rest-client.zep.url=https://www.zep-online.de/zepgepardecservices_test