# -----------------------------
# Application
# -----------------------------
quarkus.application.name=gemini4mega
quarkus.http.port=8080

# -----------------------------
# Logging
# -----------------------------
quarkus.log.level=INFO
quarkus.log.category."com.gepardec".level=INFO

# -----------------------------
# REST Client base URL
# -----------------------------
zep.base-url=https://www.zep-online.de/zepgepardecservices_test/next/api/v1/

# Named config key kept for backwards compat
quarkus.rest-client.zep.url=${zep.base-url}

# Generated API interfaces (no configKey → must be registered by FQCN)
quarkus.rest-client."com.gepardec.zep.api.AttendancesApi".url=${zep.base-url}
quarkus.rest-client."com.gepardec.zep.api.AttendancesApi".providers=com.gepardec.zep.AuthHeadersFilter
quarkus.rest-client."com.gepardec.zep.api.ProjectsApi".url=${zep.base-url}
quarkus.rest-client."com.gepardec.zep.api.ProjectsApi".providers=com.gepardec.zep.AuthHeadersFilter
quarkus.rest-client."com.gepardec.zep.api.EmployeesApi".url=${zep.base-url}
quarkus.rest-client."com.gepardec.zep.api.EmployeesApi".providers=com.gepardec.zep.AuthHeadersFilter
quarkus.rest-client."com.gepardec.zep.api.AbsencesApi".url=${zep.base-url}
quarkus.rest-client."com.gepardec.zep.api.AbsencesApi".providers=com.gepardec.zep.AuthHeadersFilter
quarkus.rest-client."com.gepardec.zep.api.ArticlesApi".url=${zep.base-url}
quarkus.rest-client."com.gepardec.zep.api.ArticlesApi".providers=com.gepardec.zep.AuthHeadersFilter
quarkus.rest-client."com.gepardec.zep.api.CustomersApi".url=${zep.base-url}
quarkus.rest-client."com.gepardec.zep.api.CustomersApi".providers=com.gepardec.zep.AuthHeadersFilter
quarkus.rest-client."com.gepardec.zep.api.DepartmentsApi".url=${zep.base-url}
quarkus.rest-client."com.gepardec.zep.api.DepartmentsApi".providers=com.gepardec.zep.AuthHeadersFilter
quarkus.rest-client."com.gepardec.zep.api.DevicesApi".url=${zep.base-url}
quarkus.rest-client."com.gepardec.zep.api.DevicesApi".providers=com.gepardec.zep.AuthHeadersFilter
quarkus.rest-client."com.gepardec.zep.api.InvoicesApi".url=${zep.base-url}
quarkus.rest-client."com.gepardec.zep.api.InvoicesApi".providers=com.gepardec.zep.AuthHeadersFilter
quarkus.rest-client."com.gepardec.zep.api.OffersApi".url=${zep.base-url}
quarkus.rest-client."com.gepardec.zep.api.OffersApi".providers=com.gepardec.zep.AuthHeadersFilter
quarkus.rest-client."com.gepardec.zep.api.ReceiptsApi".url=${zep.base-url}
quarkus.rest-client."com.gepardec.zep.api.ReceiptsApi".providers=com.gepardec.zep.AuthHeadersFilter
quarkus.rest-client."com.gepardec.zep.api.TicketsApi".url=${zep.base-url}
quarkus.rest-client."com.gepardec.zep.api.TicketsApi".providers=com.gepardec.zep.AuthHeadersFilter
#quarkus.rest-client.zep.connect-timeout=5S
#quarkus.rest-client.zep.read-timeout=30S

zep.rest-token=${ZEP_REST_TOKEN:}

# -----------------------------
# LangChain4j OpenAI
# Used by: PromptService (@RegisterAiService)
# -----------------------------

quarkus.langchain4j.openai.api-key=APT-TOKEN

quarkus.langchain4j.chat-model.provider=openai
quarkus.langchain4j.ai.gemini.chat-model.model-id=gpt-4o

#quarkus.langchain4j.ai.gemini.chat-model.temperature=0.2
#quarkus.langchain4j.ai.gemini.chat-model.top-p=0.9
#quarkus.langchain4j.chat-memory.memory-window.max-messages=20

quarkus.langchain4j.log-requests=true
quarkus.langchain4j.log-responses=true

# -----------------------------
# Profile-specific overrides
# -----------------------------
%dev.quarkus.log.level=DEBUG
%dev.quarkus.rest-client.zep.url=https://www.zep-online.de/zepgepardecservices_test/next/api/v1/

%dev.zep.rest-token=${ZEP_REST_TOKEN:default}

%test.quarkus.log.level=DEBUG
%test.zep.base-url=https://www.zep-online.de/zepgepardecservices_test/next/api/v1/

%test.zep.rest-token=${ZEP_REST_TOKEN:default}

quarkus.rest-client.logging.scope=all