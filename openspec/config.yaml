# openspec/config.yaml

context: |
  ### System Overview & Domain
  This microservice serves as an automated quality-assurance and compliance auditor for time tracking. 
  Its primary objective is to pull time-log entries from ZEP (our time tracking platform) and leverage 
  a Large Language Model (LLM) to inspect, validate, and verify those entries against organizational 
  policies or contextual correctness that can not be checked programmatically (e.g., identifying vague descriptions or mismatched allocations).

  ### Tech Stack
  - **Framework:** Quarkus 3.34
  - **Build Automation & Dependency Management:** Apache Maven (pom.xml)
  - **Language:** Java
  - **External API Clients:** Quarkus REST Clients automatically generated via OpenAPI specifications targeting ZEP REST Endpoints.
  - **AI / LLM Layer:** LLM integration using LangChain4j.

  ### Architecture & Patterns
  - **Separation of Concerns:** Autogenerated ZEP client stubs must live in their own dedicated package or module, safely isolated from core domain logic.
  - **Orchestration Layer:** A dedicated service layer manages the workflow: fetching data from ZEP endpoints, mapping payloads, building context-rich LLM prompts, and processing LLM outputs into structured auditing verdicts.
  - **Reactive & Non-Blocking Execution:** Ensure proper alignment with Quarkus reactive paradigms. Use appropriate annotations (such as @Blocking) if interacting with synchronous LLM client APIs within reactive execution paths.

  ### Coding Standards & Guidelines
  - Write native-image friendly Java code by avoiding unconfigured reflection.
  - Ensure all prompt templates, system instructions, and LLM schemas are externalized or neatly encapsulated for easy versioning.
  - Handle external REST or LLM rate limits, timeouts, and transit failures gracefully with fallback mechanisms.

rules:
  proposal:
    - "Verify if the proposed change is possible without adjustments to the ZEP OpenAPI spec."
    - "Specify changes to the LLM prompt structure."
  design:
    - "Address cost, latency, and error-handling paths for the LLM integrations."
  tasks:
